# Vendored from egui_commonmark_backend 0.18.0 (MIT OR Apache-2.0), patched to
# render inline text color from <span style="color:#rrggbb"> spans. See
# src/misc.rs (Style.color) and the frontend's InlineHtml handling.
[package]
name = "egui_commonmark_backend"
version = "0.18.0"
edition = "2021"
license = "MIT OR Apache-2.0"

[dependencies]
egui = { version = "0.29", default-features = false }
egui_extras = { version = "0.29", default-features = false }
pulldown-cmark = { version = "0.12", default-features = false }
syntect = { version = "5.0.0", features = ["default-fancy"], optional = true, default-features = false }

[features]
better_syntax_highlighting = ["dep:syntect"]
