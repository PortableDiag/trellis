# Vendored from egui_commonmark 0.18.0 (MIT OR Apache-2.0), patched so inline
# <span style="color:#rrggbb"> spans colour their text in the live viewer
# (upstream drops all inline HTML). The optional macros crate is dropped.
[package]
name = "egui_commonmark"
version = "0.18.0"
edition = "2021"
license = "MIT OR Apache-2.0"

[dependencies]
egui = { version = "0.29", default-features = false }
egui_commonmark_backend = { path = "../egui_commonmark_backend", default-features = false }
egui_extras = { version = "0.29", default-features = false }
pulldown-cmark = { version = "0.12", default-features = false }
document-features = { version = "0.2", optional = true }

[features]
better_syntax_highlighting = ["egui_commonmark_backend/better_syntax_highlighting"]
default = ["load-images", "pulldown_cmark"]
fetch = ["egui_extras/http"]
load-images = ["egui_extras/image", "egui_extras/file"]
pulldown_cmark = []
svg = ["egui_extras/svg"]
